<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes Studio</title>
    <link rel="icon" href="https://i.ibb.co/Q8Bmh0n/images.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f2f6ff;
            --bg-grad-1: #d4e4ff;
            --bg-grad-2: #ffd5c6;
            --surface: rgba(255, 255, 255, 0.82);
            --surface-border: rgba(255, 255, 255, 0.7);
            --ink: #1f2937;
            --muted: #6b7280;
            --accent: #1f6feb;
            --accent-soft: #dbeafe;
            --success: #0f766e;
            --danger: #b91c1c;
            --field: rgba(255, 255, 255, 0.9);
            --field-border: #e5e7eb;
            --shadow: 0 24px 60px rgba(12, 30, 70, 0.18);
        }

        body.dark-mode {
            --bg: #0f172a;
            --bg-grad-1: #1e293b;
            --bg-grad-2: #0b2e4f;
            --surface: rgba(17, 25, 40, 0.82);
            --surface-border: rgba(148, 163, 184, 0.2);
            --ink: #e5e7eb;
            --muted: #94a3b8;
            --accent: #60a5fa;
            --accent-soft: rgba(96, 165, 250, 0.18);
            --success: #2dd4bf;
            --danger: #fca5a5;
            --field: rgba(15, 23, 42, 0.75);
            --field-border: rgba(148, 163, 184, 0.3);
            --shadow: 0 24px 65px rgba(2, 6, 23, 0.7);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Manrope", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 10% 10%, var(--bg-grad-1), transparent 35%),
                radial-gradient(circle at 90% 20%, var(--bg-grad-2), transparent 45%),
                var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            transition: background-color 0.35s ease, color 0.35s ease;
        }

        .blob {
            position: fixed;
            width: 330px;
            height: 330px;
            border-radius: 50%;
            filter: blur(32px);
            opacity: 0.32;
            z-index: 0;
            pointer-events: none;
            animation: floatBlob 9s ease-in-out infinite alternate;
        }

        .blob-a {
            left: -110px;
            top: -80px;
            background: #93c5fd;
        }

        .blob-b {
            right: -120px;
            bottom: -120px;
            background: #fb7185;
            animation-delay: 1.2s;
        }

        @keyframes floatBlob {
            from {
                transform: translateY(0px) translateX(0px);
            }

            to {
                transform: translateY(12px) translateX(14px);
            }
        }

        .app {
            width: min(980px, 100%);
            background: var(--surface);
            border: 1px solid var(--surface-border);
            box-shadow: var(--shadow);
            backdrop-filter: blur(16px);
            border-radius: 24px;
            padding: 22px;
            position: relative;
            z-index: 1;
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }

        .app-title {
            margin: 0;
            font-size: clamp(1.1rem, 2.3vw, 1.45rem);
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .app-subtitle {
            margin: 3px 0 0;
            font-size: 0.9rem;
            color: var(--muted);
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        button {
            border: 1px solid transparent;
            border-radius: 12px;
            padding: 9px 12px;
            font-family: inherit;
            font-size: 0.88rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.18s ease, background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease;
        }

        button:hover {
            transform: translateY(-1px);
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-soft {
            background: var(--accent-soft);
            color: var(--accent);
            border-color: transparent;
        }

        .btn-ghost {
            background: transparent;
            color: var(--ink);
            border-color: var(--field-border);
        }

        .btn-danger {
            color: var(--danger);
            border-color: color-mix(in srgb, var(--danger) 35%, transparent);
            background: transparent;
        }

        #themeToggle {
            min-width: 68px;
            height: 42px;
            border-radius: 999px;
            padding: 0 12px;
            font-size: 0.82rem;
        }

        .status-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin: 8px 0 14px;
            background: var(--field);
            border: 1px solid var(--field-border);
            border-radius: 12px;
            padding: 9px 12px;
            font-size: 0.85rem;
        }

        .save-status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--muted);
        }

        .save-status.saving .dot {
            background: var(--accent);
            animation: pulse 1s infinite;
        }

        .save-status.saved .dot {
            background: var(--success);
        }

        .save-status.error .dot {
            background: var(--danger);
        }

        @keyframes pulse {
            0% {
                transform: scale(0.8);
                opacity: 0.45;
            }

            60% {
                transform: scale(1.2);
                opacity: 1;
            }

            100% {
                transform: scale(0.8);
                opacity: 0.45;
            }
        }

        .editor {
            display: grid;
            gap: 12px;
        }

        .field {
            width: 100%;
            border-radius: 14px;
            border: 1px solid var(--field-border);
            background: var(--field);
            color: var(--ink);
            font-family: inherit;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .field:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 18%, transparent);
        }

        #noteTitle {
            padding: 14px 16px;
            font-size: 1.12rem;
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        #userText {
            min-height: 54vh;
            resize: vertical;
            padding: 16px;
            font-size: 1rem;
            line-height: 1.62;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 8px;
            margin-top: 4px;
        }

        .stat {
            background: var(--field);
            border: 1px solid var(--field-border);
            border-radius: 12px;
            padding: 9px;
            text-align: center;
        }

        .stat .label {
            display: block;
            font-size: 0.72rem;
            color: var(--muted);
            margin-bottom: 3px;
        }

        .stat .value {
            font-weight: 800;
            font-size: 0.98rem;
        }

        .hint {
            margin-top: 8px;
            font-size: 0.8rem;
            color: var(--muted);
            text-align: right;
        }

        @media (max-width: 760px) {
            body {
                padding: 14px;
            }

            .app {
                border-radius: 18px;
                padding: 16px;
            }

            .stats {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            #userText {
                min-height: 48vh;
            }
        }
    </style>
</head>

<body>
    <div class="blob blob-a"></div>
    <div class="blob blob-b"></div>

    <main class="app">
        <section class="topbar">
            <div>
                <h1 class="app-title">Notes Studio</h1>
                <p class="app-subtitle">Write quickly. Save instantly. Continue anytime.</p>
            </div>
            <div class="control-group">
                <button id="saveBtn" class="btn-primary" type="button">Save</button>
                <button id="downloadBtn" class="btn-soft" type="button">Download</button>
                <button id="copyBtn" class="btn-ghost" type="button">Copy</button>
                <button id="clearBtn" class="btn-danger" type="button">Clear</button>
                <button id="themeToggle" class="btn-ghost" type="button" aria-label="Toggle theme">Light</button>
            </div>
        </section>

        <section class="status-bar">
            <div id="saveStatus" class="save-status saved">
                <span class="dot"></span>
                <span id="statusText">Saved</span>
            </div>
            <div id="lastSaved" aria-live="polite">Last saved: Never</div>
        </section>

        <section class="editor">
            <input id="noteTitle" class="field" type="text" placeholder="Untitled note">
            <textarea id="userText" class="field" placeholder="Start writing your notes..."></textarea>
        </section>

        <section class="stats" aria-live="polite">
            <div class="stat">
                <span class="label">Words</span>
                <span id="wordCount" class="value">0</span>
            </div>
            <div class="stat">
                <span class="label">Characters</span>
                <span id="charCount" class="value">0</span>
            </div>
            <div class="stat">
                <span class="label">Reading Time</span>
                <span id="readingTime" class="value">0 min</span>
            </div>
            <div class="stat">
                <span class="label">Title Length</span>
                <span id="titleCount" class="value">0</span>
            </div>
        </section>

        <p class="hint">Autosaves every 1.5s after typing. Use Ctrl/Cmd + S for instant save.</p>
    </main>

    <script>
        const STORAGE_KEY = "notes_app_data_v2";
        const LEGACY_STORAGE_KEY = "notes_app_data_v1";
        const THEME_KEY = "notes_theme_v1";
        const AUTOSAVE_DELAY_MS = 1500;

        const noteTitleInput = document.getElementById("noteTitle");
        const userTextInput = document.getElementById("userText");
        const saveBtn = document.getElementById("saveBtn");
        const downloadBtn = document.getElementById("downloadBtn");
        const copyBtn = document.getElementById("copyBtn");
        const clearBtn = document.getElementById("clearBtn");
        const themeToggle = document.getElementById("themeToggle");

        const saveStatus = document.getElementById("saveStatus");
        const statusText = document.getElementById("statusText");
        const lastSaved = document.getElementById("lastSaved");

        const wordCount = document.getElementById("wordCount");
        const charCount = document.getElementById("charCount");
        const readingTime = document.getElementById("readingTime");
        const titleCount = document.getElementById("titleCount");

        let autoSaveTimer = null;

        function formatTime(ts) {
            if (!ts) return "Never";
            return new Date(ts).toLocaleTimeString([], {
                hour: "2-digit",
                minute: "2-digit",
                second: "2-digit"
            });
        }

        function setSaveStatus(state, text) {
            saveStatus.classList.remove("saving", "saved", "error");
            saveStatus.classList.add(state);
            statusText.textContent = text;
        }

        function computeWords(text) {
            const trimmed = text.trim();
            if (!trimmed) return 0;
            return trimmed.split(/\s+/).length;
        }

        function updateStats() {
            const body = userTextInput.value;
            const words = computeWords(body);
            const chars = body.length;
            const minutes = Math.max(1, Math.ceil(words / 200));

            wordCount.textContent = words;
            charCount.textContent = chars;
            readingTime.textContent = words === 0 ? "0 min" : `${minutes} min`;
            titleCount.textContent = noteTitleInput.value.length;
        }

        function getPayload() {
            return {
                title: noteTitleInput.value,
                description: userTextInput.value,
                updatedAt: Date.now()
            };
        }

        function saveToLocalStorage(showSavedStatus = true) {
            try {
                setSaveStatus("saving", "Saving...");
                const payload = getPayload();
                localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
                lastSaved.textContent = `Last saved: ${formatTime(payload.updatedAt)}`;

                if (showSavedStatus) {
                    setSaveStatus("saved", "Saved");
                }
            } catch (error) {
                console.error("Failed to save note", error);
                setSaveStatus("error", "Save failed");
            }
        }

        function scheduleAutoSave() {
            setSaveStatus("saving", "Saving...");
            if (autoSaveTimer) clearTimeout(autoSaveTimer);
            autoSaveTimer = setTimeout(() => saveToLocalStorage(true), AUTOSAVE_DELAY_MS);
        }

        function loadSavedNote() {
            const raw = localStorage.getItem(STORAGE_KEY) || localStorage.getItem(LEGACY_STORAGE_KEY);
            if (!raw) {
                updateStats();
                return;
            }

            try {
                const data = JSON.parse(raw);
                noteTitleInput.value = data.title || "";
                userTextInput.value = data.description || "";
                updateStats();
                setSaveStatus("saved", "Saved");
                lastSaved.textContent = `Last saved: ${formatTime(data.updatedAt)}`;
            } catch (error) {
                console.error("Invalid saved note data", error);
                setSaveStatus("error", "Load failed");
                updateStats();
            }
        }

        function loadTheme() {
            const theme = localStorage.getItem(THEME_KEY);
            if (theme === "dark") {
                document.body.classList.add("dark-mode");
            }
            themeToggle.textContent = document.body.classList.contains("dark-mode") ? "Dark" : "Light";
        }

        function toggleTheme() {
            document.body.classList.toggle("dark-mode");
            const dark = document.body.classList.contains("dark-mode");
            localStorage.setItem(THEME_KEY, dark ? "dark" : "light");
            themeToggle.textContent = dark ? "Dark" : "Light";
        }

        function downloadText() {
            const noteTitle = noteTitleInput.value.trim();
            const userText = userTextInput.value;
            const blob = new Blob([userText], { type: "text/plain" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = (noteTitle ? noteTitle.toLowerCase().replace(/\s+/g, "_") : "untitled_note") + ".txt";
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(link.href);
        }

        async function copyNote() {
            const text = userTextInput.value;
            if (!text.trim()) return;
            try {
                await navigator.clipboard.writeText(text);
                const previous = copyBtn.textContent;
                copyBtn.textContent = "Copied";
                setTimeout(() => {
                    copyBtn.textContent = previous;
                }, 1200);
            } catch (error) {
                console.error("Copy failed", error);
            }
        }

        function clearNote() {
            const shouldClear = window.confirm("Clear title and note content?");
            if (!shouldClear) return;

            noteTitleInput.value = "";
            userTextInput.value = "";
            updateStats();
            saveToLocalStorage(true);
        }

        document.addEventListener("keydown", (event) => {
            const isSaveShortcut = (event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "s";
            if (!isSaveShortcut) return;

            event.preventDefault();
            if (autoSaveTimer) clearTimeout(autoSaveTimer);
            saveToLocalStorage(true);
        });

        noteTitleInput.addEventListener("input", () => {
            updateStats();
            scheduleAutoSave();
        });

        userTextInput.addEventListener("input", () => {
            updateStats();
            scheduleAutoSave();
        });

        saveBtn.addEventListener("click", () => {
            if (autoSaveTimer) clearTimeout(autoSaveTimer);
            saveToLocalStorage(true);
        });
        downloadBtn.addEventListener("click", downloadText);
        copyBtn.addEventListener("click", copyNote);
        clearBtn.addEventListener("click", clearNote);
        themeToggle.addEventListener("click", toggleTheme);

        loadTheme();
        loadSavedNote();
    </script>
</body>

</html>
